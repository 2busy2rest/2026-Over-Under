<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travis vs Lucas · O/U Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --surface: #161b27; --border: #252d3d;
    --text: #e8eaf0; --muted: #6b7694; --accent: #4f7cff;
    --win-bg: #0d2218; --win-border: #1a5c35; --win-text: #4ade80;
    --lose-bg: #220d0d; --lose-border: #5c1a1a; --lose-text: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
  #subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }

  #refresh-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  #refresh-btn:hover { opacity: 0.85; }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status { font-size: 11px; color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 20px; min-height: 28px; display: flex; align-items: center; }
  #status.error { color: #f87171; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; max-width: 820px; margin: 24px auto 0; padding: 0 14px; gap: 14px; }

  .col-head { text-align: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 2px solid var(--border); }
  .col-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  .col-score { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 700; line-height: 1; color: #fff; margin-top: 2px; }

  .cards { display: flex; flex-direction: column; gap: 6px; }

  .card { border-radius: 8px; padding: 9px 11px; border: 1px solid var(--border); background: var(--surface); }
  .card.win  { background: var(--win-bg);  border-color: var(--win-border); }
  .card.lose { background: var(--lose-bg); border-color: var(--lose-border); }

  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

  .team-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; display: inline-block; }

  .opponent { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
  .opponent-label { color: #64748b; }
  .result-w { font-weight: 700; color: #4ade80; }
  .result-l { font-weight: 700; color: #f87171; }
  .no-game { font-size: 11px; color: #3a4260; font-style: italic; }

  .card-right { text-align: right; flex-shrink: 0; }
  .card-record { font-size: 12px; font-weight: 500; color: #cbd5e1; }

  /* Proj row: proj number + close badge inline */
  .card-proj-row { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 2px; }
  .card-proj { font-size: 11px; color: #e2e8f0; letter-spacing: 0.2px; white-space: nowrap; }

  .close-badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); line-height: 1.4; }

  /* Bottom row: always just pick badge + full-width progress bar */
  .card-bottom { display: flex; align-items: center; gap: 6px; margin-top: 6px; }

  .pick-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
  .over  { background: rgba(74,222,128,0.15); color: #4ade80; }
  .under { background: rgba(251,146,60,0.15); color: #fb923c; }

  .prog { height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; flex: 1; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; }

  .empty { text-align: center; padding: 20px 0; font-size: 12px; color: var(--muted); font-style: italic; }
  .note { text-align: center; margin-top: 24px; font-size: 11px; color: #2e3650; }
  .note a { color: #3a5299; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Travis vs Lucas &nbsp;·&nbsp; O/U Tracker</h1>
    <div id="subtitle">Open locally · click Refresh for live standings</div>
  </div>
  <button id="refresh-btn" onclick="loadData()">
    <div class="spinner" id="spinner"></div>
    Refresh
  </button>
</header>
<div id="status">Click "Refresh" to load live MLB records from ESPN.</div>

<div class="grid">
  <div>
    <div class="col-head">
      <div class="col-name">Travis</div>
      <div class="col-score" id="t-score">—</div>
    </div>
    <div class="cards" id="t-col"><div class="empty">Load standings to see picks</div></div>
  </div>
  <div>
    <div class="col-head">
      <div class="col-name">Lucas</div>
      <div class="col-score" id="l-score">—</div>
    </div>
    <div class="cards" id="l-col"><div class="empty">Load standings to see picks</div></div>
  </div>
</div>
<div class="note">Records via <a href="https://www.espn.com/mlb/standings" target="_blank">ESPN MLB Standings</a> · Projected wins based on current W%</div>

<script>
const PICKS = [
  { team:"Padres",    line:84.5, travis:"Under", lucas:"Over"  },
  { team:"Giants",    line:81.5, travis:"Over",  lucas:"Under" },
  { team:"Brewers",   line:84.5, travis:"Over",  lucas:"Under" },
  { team:"Reds",      line:81.5, travis:"Under", lucas:"Over"  },
  { team:"Cardinals", line:69.5, travis:"Over",  lucas:"Under" },
  { team:"Braves",    line:87.5, travis:"Over",  lucas:"Under" },
  { team:"Astros",    line:85.5, travis:"Under", lucas:"Over"  },
  { team:"Rangers",   line:84.5, travis:"Over",  lucas:"Under" },
  { team:"A's",       line:76.5, travis:"Over",  lucas:"Under" },
  { team:"Guardians", line:78.5, travis:"Under", lucas:"Over"  },
  { team:"Blue Jays", line:88.5, travis:"Under", lucas:"Over"  },
  { team:"Orioles",   line:85.5, travis:"Over",  lucas:"Under" },
];

const TEAM_COLORS = {
  "Padres":    { bg: "#002D62", fg: "#BFA067" },
  "Giants":    { bg: "#FD5A1E", fg: "#000000" },
  "Brewers":   { bg: "#0A2351", fg: "#B6922E" },
  "Reds":      { bg: "#C6011F", fg: "#ffffff" },
  "Cardinals": { bg: "#C41E3A", fg: "#ffffff" },
  "Braves":    { bg: "#13274F", fg: "#CE1141" },
  "Astros":    { bg: "#002D62", fg: "#EB6E1F" },
  "Rangers":   { bg: "#003278", fg: "#C0111F" },
  "A's":       { bg: "#003831", fg: "#EFB21E" },
  "Guardians": { bg: "#00385D", fg: "#E50022" },
  "Blue Jays": { bg: "#134A8E", fg: "#ffffff" },
  "Orioles":   { bg: "#DF4601", fg: "#000000" },
};

const ESPN_TO_NAME = {
  "SD":"Padres","SF":"Giants","MIL":"Brewers","CIN":"Reds","STL":"Cardinals",
  "ATL":"Braves","HOU":"Astros","TEX":"Rangers","OAK":"A's","ATH":"A's",
  "CLE":"Guardians","TOR":"Blue Jays","BAL":"Orioles"
};

const NAME_TO_ESPN = {
  "Padres":"SD","Giants":"SF","Brewers":"MIL","Reds":"CIN","Cardinals":"STL",
  "Braves":"ATL","Astros":"HOU","Rangers":"TEX","A's":"OAK","Guardians":"CLE",
  "Blue Jays":"TOR","Orioles":"BAL"
};

const CLOSE_THRESHOLD = 5;

function projWins(w, l) { const g=w+l; return g>0 ? (w/g)*162 : null; }
function isWinning(proj, line, pick) {
  if (proj===null) return null;
  return (proj > line ? "Over" : "Under") === pick;
}
function isClose(proj, line) {
  if (proj===null) return false;
  return Math.abs(proj - line) <= CLOSE_THRESHOLD;
}

function renderOpponent(gameInfo) {
  if (!gameInfo) return `<span class="no-game">no game today</span>`;
  const { opponent, status, won } = gameInfo;
  if (status === "final") {
    const cls = won ? "result-w" : "result-l";
    const letter = won ? "W" : "L";
    return `<span class="opponent"><span class="${cls}">${letter}</span><span class="opponent-label"> vs</span> <span>${opponent}</span></span>`;
  }
  const label = status === "in" ? "▸ vs" : "vs";
  return `<span class="opponent"><span class="opponent-label">${label}</span> <span>${opponent}</span></span>`;
}

function makeCard(pick, w, l, isTravis, gameInfo) {
  const myPick = isTravis ? pick.travis : pick.lucas;
  const proj = projWins(w, l);
  const winning = isTravis ? isWinning(proj, pick.line, pick.travis) : false;
  const cls = isTravis ? (winning===null ? "" : winning ? "win" : "lose") : "lose";
  const close = isClose(proj, pick.line);
  const projStr = proj ? proj.toFixed(1) : "—";
  const games = w+l;
  const pct = Math.min((games/162)*100, 100).toFixed(1);
  const barColor = cls==="win" ? "#4ade80" : cls==="lose" ? "#f87171" : "#3a4260";
  const tc = TEAM_COLORS[pick.team] || { bg: "#2a3350", fg: "#ffffff" };
  const closeBadge = (close && proj!==null) ? `<span class="close-badge">close</span>` : "";

  return `<div class="card ${cls}">
    <div class="card-row">
      <div class="card-left">
        <span class="team-badge" style="background:${tc.bg};color:${tc.fg}">${pick.team}</span>
        ${renderOpponent(gameInfo)}
      </div>
      <div class="card-right">
        <div class="card-record">${w}–${l}</div>
        <div class="card-proj-row">
          <div class="card-proj">proj ${projStr} · line ${pick.line}</div>
          ${closeBadge}
        </div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="pick-badge ${myPick==='Over'?'over':'under'}">${myPick}</span>
      <div class="prog"><div class="prog-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>
  </div>`;
}

function render(records, gameMap) {
  let tW=0, lW=0, tHTML="", lHTML="";
  for (const pick of PICKS) {
    const rec = records[pick.team] || {wins:0, losses:0};
    const proj = projWins(rec.wins, rec.losses);
    const travisWinning = isWinning(proj, pick.line, pick.travis);
    const lucasWinning  = isWinning(proj, pick.line, pick.lucas);
    if (travisWinning===true) tW++;
    if (lucasWinning===true)  lW++;
    const gameInfo = gameMap[pick.team] || null;
    if (travisWinning===false) { lHTML += makeCard(pick, rec.wins, rec.losses, false, gameInfo); }
    else                       { tHTML += makeCard(pick, rec.wins, rec.losses, true,  gameInfo); }
  }
  document.getElementById("t-col").innerHTML = tHTML || '<div class="empty">None here yet</div>';
  document.getElementById("l-col").innerHTML = lHTML || '<div class="empty">None here yet</div>';
  document.getElementById("t-score").textContent = tW;
  document.getElementById("l-score").textContent = lW;
}

async function loadData() {
  const btn=document.getElementById("refresh-btn");
  const sp=document.getElementById("spinner");
  const st=document.getElementById("status");
  btn.disabled=true; sp.style.display="block";
  st.className=""; st.textContent="Fetching standings and today's games...";

  try {
    const [standingsRes, scoreboardRes] = await Promise.all([
      fetch("https://site.api.espn.com/apis/v2/sports/baseball/mlb/standings?season=2026"),
      fetch("https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard")
    ]);
    if (!standingsRes.ok) throw new Error(`Standings HTTP ${standingsRes.status}`);
    if (!scoreboardRes.ok) throw new Error(`Scoreboard HTTP ${scoreboardRes.status}`);

    const [standingsData, scoreboardData] = await Promise.all([
      standingsRes.json(),
      scoreboardRes.json()
    ]);

    // Parse standings
    const records = {};
    for (const division of standingsData.children||[]) {
      for (const entry of division.standings?.entries||[]) {
        const name = ESPN_TO_NAME[entry.team?.abbreviation||""];
        if (!name) continue;
        let wins=0, losses=0;
        for (const stat of entry.stats||[]) {
          if (stat.name==="wins")   wins   = parseInt(stat.value)||0;
          if (stat.name==="losses") losses = parseInt(stat.value)||0;
        }
        records[name] = {wins, losses};
      }
    }
    if (Object.keys(records).length===0) throw new Error("Parsed 0 teams from standings.");

    // Parse scoreboard
    const gameMap = {};
    for (const event of scoreboardData.events||[]) {
      const comp = event.competitions?.[0];
      if (!comp) continue;
      const competitors = comp.competitors||[];
      if (competitors.length < 2) continue;
      const stateType = comp.status?.type?.state||"";
      const statusStr = stateType==="post" ? "final" : stateType==="in" ? "in" : "pre";

      for (const team of competitors) {
        const name = ESPN_TO_NAME[team.team?.abbreviation||""];
        if (!name) continue;
        const opp = competitors.find(c => c.team?.abbreviation !== team.team?.abbreviation);
        const oppName = opp?.team?.shortDisplayName || opp?.team?.abbreviation || "?";
        const won = statusStr==="final" ? (team.winner===true) : null;
        gameMap[name] = { opponent: oppName, status: statusStr, won };
      }
    }

    render(records, gameMap);
    const now = new Date();
    document.getElementById("subtitle").textContent =
      "Updated " + now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) +
      " · " + now.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
    st.textContent = `✓ Standings and today's games loaded.`;

  } catch(err) {
    st.className="error";
    st.textContent="Error: "+err.message;
    console.error(err);
  }
  btn.disabled=false; sp.style.display="none";
}
</script>
</body>
</html>
